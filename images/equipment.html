<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #fff; padding: 20px; margin: 0; }
    .header { background: #16213e; padding: 15px 20px; border-bottom: 2px solid #e94560; }
    .header h1 { margin: 0; color: #e94560; font-size: 18px; }
    .toolbar { background: #0f3460; padding: 10px 20px; display: flex; gap: 10px; }
    .btn { background: #e94560; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
    .gear { background: #16213e; border-radius: 8px; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
    .gear-info { display: flex; align-items: center; gap: 15px; }
    .gear-icon { background: #0f3460; width: 50px; height: 50px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .gear-name { font-weight: bold; }
    .gear-serial { font-size: 12px; color: #888; }
    .gear-status { text-align: right; }
    .status { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .available { background: #1a4a3a; color: #4ade80; }
    .checked-out { background: #4a3a1a; color: #fbbf24; }
    .due-date { font-size: 11px; color: #888; margin-top: 4px; }
    .person { font-size: 13px; color: #fbbf24; }
  </style>
</head>
<body>
  <div class="header"><h1>📸 Equipment Checkout</h1></div>
  <div class="toolbar">
    <button class="btn">+ Add Gear</button>
    <button class="btn" style="background:#0f3460">Check In</button>
  </div>
  <div class="grid">
    <div class="gear">
      <div class="gear-info">
        <div class="gear-icon">📷</div>
        <div>
          <div class="gear-name">RED Komodo</div>
          <div class="gear-serial">SN: RK-2024-0892</div>
        </div>
      </div>
      <div class="gear-status">
        <span class="status checked-out">Checked Out</span>
        <div class="due-date">Due: May 8</div>
        <div class="person">→ Mike R.</div>
      </div>
    </div>
    <div class="gear">
      <div class="gear-info">
        <div class="gear-icon">🔦</div>
        <div>
          <div class="gear-name">Aputure 600d Pro</div>
          <div class="gear-serial">SN: AP-600-4421</div>
        </div>
      </div>
      <div class="gear-status">
        <span class="status available">Available</span>
        <div class="due-date">In stock</div>
      </div>
    </div>
    <div class="gear">
      <div class="gear-info">
        <div class="gear-icon">🎥</div>
        <div>
          <div class="gear-name">Sennheiser MKH 416</div>
          <div class="gear-serial">SN: SM-416-1122</div>
        </div>
      </div>
      <div class="gear-status">
        <span class="status checked-out">Checked Out</span>
        <div class="due-date">Due: May 10</div>
        <div class="person">→ Sarah L.</div>
      </div>
    </div>
    <div class="gear">
      <div class="gear-info">
        <div class="gear-icon">📹</div>
        <div>
          <div class="gear-name">DJI Ronin RS3 Pro</div>
          <div class="gear-serial">SN: RS-3-8891</div>
        </div>
      </div>
      <div class="gear-status">
        <span class="status available">Available</span>
        <div class="due-date">In stock</div>
      </div>
    </div>
  </div>
</body>
</html>
