<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #fff; padding: 20px; margin: 0; }
    .header { background: #16213e; padding: 15px 20px; border-bottom: 2px solid #e94560; }
    .header h1 { margin: 0; color: #e94560; font-size: 18px; }
    .toolbar { background: #0f3460; padding: 10px 20px; display: flex; gap: 10px; }
    .btn { background: #e94560; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px; }
    .frame { background: #16213e; border-radius: 8px; overflow: hidden; }
    .frame-img { background: linear-gradient(135deg, #2a2a4a 0%, #1a1a2e 100%); height: 120px; display: flex; align-items: center; justify-content: center; }
    .frame-img span { font-size: 40px; opacity: 0.5; }
    .frame-content { padding: 12px; }
    .frame-num { background: #e94560; display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 8px; }
    .frame-notes { font-size: 12px; color: #888; }
    .frame-specs { font-size: 11px; color: #666; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="header"><h1>🎞 Storyboard</h1></div>
  <div class="toolbar">
    <button class="btn">+ Add Frame</button>
    <button class="btn" style="background:#0f3460">Export PDF</button>
  </div>
  <div class="grid">
    <div class="frame">
      <div class="frame-img"><span>🏙</span></div>
      <div class="frame-content">
        <span class="frame-num">1</span>
        <div class="frame-notes">Wide establishing shot of city skyline at dawn</div>
        <div class="frame-specs">Pan Right • 24mm • Day</div>
      </div>
    </div>
    <div class="frame">
      <div class="frame-img"><span>🚶</span></div>
      <div class="frame-content">
        <span class="frame-num">2</span>
        <div class="frame-notes">Two characters walking toward camera</div>
        <div class="frame-specs">Dolly Forward • 35mm • Day</div>
      </div>
    </div>
    <div class="frame">
      <div class="frame-img"><span>😱</span></div>
      <div class="frame-content">
        <span class="frame-num">3</span>
        <div class="frame-notes">Close-up of shocked expression</div>
        <div class="frame-specs">Static • 85mm • Day</div>
      </div>
    </div>
    <div class="frame">
      <div class="frame-img"><span>🔫</span></div>
      <div class="frame-content">
        <span class="frame-num">4</span>
        <div class="frame-notes">Wide shot of action sequence</div>
        <div class="frame-specs">Handheld • 28mm • Night</div>
      </div>
    </div>
  </div>
</body>
</html>
